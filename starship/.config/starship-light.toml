"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](surface0)\
$os\
$directory\
[](fg:surface0 bg:surface1)\
$git_branch\
$git_status\
[](fg:surface1 bg:surface2)\
$nodejs\
$python\
$golang\
$rust\
[](fg:surface2 bg:overlay0)\
$docker_context\
$cmd_duration\
[](fg:overlay0)\
$line_break\
$character"""

# Dark default. config.fish points STARSHIP_CONFIG at starship-light.toml (same
# file, palette = 'catppuccin_latte') when macOS is in light mode.
palette = 'catppuccin_latte'
add_newline = true

[palettes.catppuccin_latte]
rosewater = "#dc8a78"
flamingo = "#dd7878"
pink = "#ea76cb"
mauve = "#8839ef"
red = "#d20f39"
peach = "#fe640b"
yellow = "#df8e1d"
green = "#40a02b"
teal = "#179299"
blue = "#1e66f5"
lavender = "#7287fd"
text = "#4c4f69"
overlay0 = "#9ca0b0"
surface2 = "#acb0be"
surface1 = "#bcc0cc"
surface0 = "#ccd0da"
base = "#eff1f5"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"

[os]
disabled = false
style = "bg:surface0 fg:text"
[os.symbols]
Macos = ""

[directory]
style = "fg:lavender bg:surface0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music" = "󰝚"
"Pictures" = ""
"Developer" = "󰲋"

[git_branch]
symbol = ""
style = "bg:surface1"
format = '[[ $symbol $branch ](fg:text bg:surface1)]($style)'

[git_status]
style = "bg:surface1"
format = '[[($all_status$ahead_behind )](fg:peach bg:surface1)]($style)'

[nodejs]
symbol = ""
style = "bg:surface2"
format = '[[ $symbol( $version) ](fg:green bg:surface2)]($style)'

[python]
symbol = ""
style = "bg:surface2"
format = '[[ $symbol( $version) ](fg:yellow bg:surface2)]($style)'

[golang]
symbol = ""
style = "bg:surface2"
format = '[[ $symbol( $version) ](fg:teal bg:surface2)]($style)'

[rust]
symbol = ""
style = "bg:surface2"
format = '[[ $symbol( $version) ](fg:peach bg:surface2)]($style)'

[docker_context]
symbol = ""
style = "bg:overlay0"
format = '[[ $symbol( $context) ](fg:text bg:overlay0)]($style)'

[cmd_duration]
min_time = 2000
style = "bg:overlay0"
format = '[[ 󱎫 $duration ](fg:text bg:overlay0)]($style)'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold mauve)'
