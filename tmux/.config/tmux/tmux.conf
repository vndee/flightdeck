# ~/.config/tmux/tmux.conf — agentic cockpit

# --- Core ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-ghostty:Tc"
set -g prefix C-a
unbind C-b
bind C-a send-prefix
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10
set -g history-limit 100000
set -g focus-events on
set -g set-clipboard on
setw -g mode-keys vi

# --- Splits & navigation (keep cwd) ---
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# New windows open at the worktree root in `wt` sessions (where @wt_root is set),
# else keep the current pane's cwd. Immune to panes whose cwd wandered (agents).
bind c new-window -c "#{?@wt_root,#{@wt_root},#{pane_current_path}}"
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# Resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# vi-style copy
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- sesh: smart session switcher (prefix + T) ---
bind -N "session switcher" T display-popup -E -w 60% -h 50% "sesh connect \"$(
  sesh list --icons | fzf --no-sort --ansi --prompt '⚡ '
)\""
bind -N "last session" L switch-client -l

# --- Agentic helpers ---
# prefix + a : spawn a Claude Code pane to the right
bind a split-window -h -c "#{pane_current_path}" "claude"
# prefix + g : lazygit popup
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

# --- Plugins (tpm) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# resurrect / continuum
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# --- Catppuccin theme ---
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_default_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Status bar layout (set after catppuccin loads)
set -g status-position top
set -g status-left ''
set -g status-right '#{E:@catppuccin_status_session}'
set -ga status-right '#{E:@catppuccin_status_directory}'

# Init tpm (keep at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
